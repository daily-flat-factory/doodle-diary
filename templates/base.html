<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Doodle-Diary 🎨{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <header class="site-header">
    <a href="/" class="logo">🎨 Doodle-Diary</a>
    <div class="header-right">
      <span id="limit-badge" class="limit-badge"></span>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
